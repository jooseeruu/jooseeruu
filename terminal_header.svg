<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="800" height="200">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Ubuntu+Mono:wght@400;700&amp;display=swap');

      .terminal-bg { fill: #300A24; }
      .titlebar { fill: #3C1040; }
      .btn-close { fill: #FF5F57; }
      .btn-min { fill: #FFBD2E; }
      .btn-max { fill: #28CA41; }
      .title-text { fill: #9B6B9B; font-family: 'Ubuntu Mono', monospace; font-size: 12px; }
      .prompt-user { fill: #4CE64C; font-family: 'Ubuntu Mono', monospace; font-size: 14px; font-weight: bold; }
      .prompt-path { fill: #729FCF; font-family: 'Ubuntu Mono', monospace; font-size: 14px; }
      .prompt-symbol { fill: #FFFFFF; font-family: 'Ubuntu Mono', monospace; font-size: 14px; }
      .cmd-text { fill: #FFFFFF; font-family: 'Ubuntu Mono', monospace; font-size: 14px; }
      .output-text { fill: #4CE64C; font-family: 'Ubuntu Mono', monospace; font-size: 14px; }
      .output-dim { fill: #9B9B9B; font-family: 'Ubuntu Mono', monospace; font-size: 14px; }
      .cursor { fill: #FFFFFF; }

      .cmd1 { 
        opacity: 0;
        animation: appear 0.01s 0.5s forwards;
      }
      .cmd2 { 
        opacity: 0;
        animation: appear 0.01s 1.8s forwards;
      }
      .out1 { 
        opacity: 0;
        animation: appear 0.01s 2.1s forwards;
      }
      .out2 { 
        opacity: 0;
        animation: appear 0.01s 2.3s forwards;
      }
      .out3 { 
        opacity: 0;
        animation: appear 0.01s 2.5s forwards;
      }
      .cmd3 { 
        opacity: 0;
        animation: appear 0.01s 3.5s forwards;
      }
      .out4 { 
        opacity: 0;
        animation: appear 0.01s 3.8s forwards;
      }

      .type-cmd1 {
        opacity: 0;
        animation: appear 0.01s 0.5s forwards;
        clip-path: inset(0 100% 0 0);
        animation: typing1 1s steps(20, end) 0.5s forwards;
      }
      .type-cmd2 {
        clip-path: inset(0 100% 0 0);
        animation: typing2 0.8s steps(16, end) 1.8s forwards;
        opacity: 0;
      }
      .type-cmd3 {
        clip-path: inset(0 100% 0 0);
        animation: typing3 0.7s steps(14, end) 3.5s forwards;
        opacity: 0;
      }

      @keyframes typing1 {
        from { clip-path: inset(0 100% 0 0); opacity: 1; }
        to   { clip-path: inset(0 0% 0 0);   opacity: 1; }
      }
      @keyframes typing2 {
        from { clip-path: inset(0 100% 0 0); opacity: 1; }
        to   { clip-path: inset(0 0% 0 0);   opacity: 1; }
      }
      @keyframes typing3 {
        from { clip-path: inset(0 100% 0 0); opacity: 1; }
        to   { clip-path: inset(0 0% 0 0);   opacity: 1; }
      }
      @keyframes appear {
        to { opacity: 1; }
      }
      @keyframes blink {
        0%, 100% { opacity: 1; }
        50% { opacity: 0; }
      }
      .cursor-blink {
        animation: blink 1s step-end infinite;
      }
    </style>
  </defs>

  <!-- Terminal background -->
  <rect width="800" height="200" rx="8" ry="8" class="terminal-bg"/>

  <!-- Title bar -->
  <rect width="800" height="32" rx="8" ry="8" class="titlebar"/>
  <rect y="16" width="800" height="16" class="titlebar"/>

  <!-- Window buttons -->
  <circle cx="20" cy="16" r="6" class="btn-close"/>
  <circle cx="40" cy="16" r="6" class="btn-min"/>
  <circle cx="60" cy="16" r="6" class="btn-max"/>

  <!-- Title bar text -->
  <text x="400" y="21" text-anchor="middle" class="title-text">ruben@ubuntu: ~/github</text>

  <!-- Line 1: prompt + command -->
  <text x="20" y="62">
    <tspan class="prompt-user">ruben@ubuntu</tspan><tspan class="prompt-symbol">:</tspan><tspan class="prompt-path">~/github</tspan><tspan class="prompt-symbol">$ </tspan>
  </text>
  <text x="178" y="62" class="cmd-text type-cmd1">git log --oneline --author="Rubén"</text>

  <!-- Line 2: output -->
  <text x="20" y="84" class="out1">
    <tspan class="output-dim">a3f2c1b </tspan><tspan class="output-text">feat: DutyFree Express — logistics integration</tspan>
  </text>
  <text x="20" y="102" class="out2">
    <tspan class="output-dim">9d8e7f6 </tspan><tspan class="output-text">feat: NautiPaints — custom PrestaShop modules</tspan>
  </text>
  <text x="20" y="120" class="out3">
    <tspan class="output-dim">1b2a3c4 </tspan><tspan class="output-text">chore: always learning, always building 🚀</tspan>
  </text>

  <!-- Line 3: new prompt + command -->
  <text x="20" y="148" class="cmd2">
    <tspan class="prompt-user">ruben@ubuntu</tspan><tspan class="prompt-symbol">:</tspan><tspan class="prompt-path">~/github</tspan><tspan class="prompt-symbol">$ </tspan>
  </text>
  <text x="178" y="148" class="cmd-text type-cmd2">cat whoami.txt</text>

  <!-- Line 4: output -->
  <text x="20" y="170" class="out4 output-text">Full Stack Web Developer | Spain 🇪🇸 | open to opportunities</text>

  <!-- Line 5: new prompt + cursor -->
  <text x="20" y="192" class="cmd3">
    <tspan class="prompt-user">ruben@ubuntu</tspan><tspan class="prompt-symbol">:</tspan><tspan class="prompt-path">~/github</tspan><tspan class="prompt-symbol">$ </tspan>
  </text>
  <rect x="178" y="180" width="9" height="14" class="cursor cursor-blink" style="animation-delay: 4.2s"/>
</svg>
